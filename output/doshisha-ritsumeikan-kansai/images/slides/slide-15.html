  <div class="title-el">入試方式の全体像（続き 9）</div>
  <div class="content"><div class="text-block"><div>各大学の方式の役割分担を補足すると、同志社大学は全学部日程と学部個別日程という2本柱のシンプルな構成で、共通テストを利用する入学試験は個別学力検査とは別の「参考」的な位置づけです。立命館大学は全学統一方式が広域併願、学部個別配点方式が学部特化、共通テスト方式が多パターン対応、共通テスト併用方式がハイブリッド型、後期分割方式が滑り止め的な役割を担う多層構造になっています。関西大学は一般入試（全学日程1・学部独自日程・全学日程2）と共通テスト利用入試（前期・併用・後期）を明確に分け、学部群によって試験日数が文系6日間・理系3日間と異なる点が特徴です。</div></div></div>
